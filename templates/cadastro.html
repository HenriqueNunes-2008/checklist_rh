{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="text-align:center; color: #1e3a8a;">Criar Conta</h2>
    <form action="/auth/cadastro" method="POST">
        <input type="text" name="nome" placeholder="Nome Completo" required>
        <input type="email" name="email" placeholder="E-mail Corporativo" required>
        <input type="password" name="senha" placeholder="Senha" required>
        
        <label class="label-cargo">Setor de Acesso:</label>
        <select name="cargo" class="select-cargo">
            <option value="RH">RH</option>
            <option value="Administrativo">Administrativo</option>
        </select>

        <button type="submit">CADASTRAR</button>
    </form>
    <p style="text-align:center; margin-top:15px;">
        Já tem conta? <a href="/login" style="color: #5b2fa6; font-weight:bold;">Login</a>
    </p>
</div>
{% endblock %}
